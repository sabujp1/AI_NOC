version: "3.9"

services:
  # ── AI NOC Gateway (FastAPI) ──────────────────────────────────────────────
  noc-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-noc-gateway
    restart: unless-stopped
    ports:
      - "7000:7000"
    env_file:
      - .env
    environment:
      - API_ENV=production
    networks:
      - noc-net
    depends_on:
      neo4j:
        condition: service_healthy

  # ── Neo4j Graph Database ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: ai-noc-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - noc-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  noc-net:
    driver: bridge
