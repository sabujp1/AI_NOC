version: "3.9"

services:
  # ── AI NOC Gateway (FastAPI) ──────────────────────────────────────────────
  noc-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-noc-gateway
    restart: unless-stopped
    ports:
      - "7000:7000"
    environment:
      # FastAPI Settings
      - API_ENV=production
      - JWT_SECRET_KEY=supersecretjwtkeyforaiopsnocplatformchangeinprod
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      # LibreNMS
      - LIBRENMS_API_URL=http://103.159.189.162:8000/api/v0
      - LIBRENMS_API_TOKEN=abca9a9cd82bfaecffb0c47445fd2c88
      # LLM / OpenRouter
      - OPENAI_API_KEY=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
      - OPENAI_API_BASE=https://openrouter.ai/api/v1
      - LLM_MODEL=nvidia/llama-nemotron-rerank-vl-1b-v2:free
      - GEMINI_API_KEY=AQ.Ab8RN6I2CDIk7jlG1YeFq49FQ35R6y5ibbU3tiBEpwEksbw8Ww
      - LLM_PROVIDER=openai
      # Neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    networks:
      - noc-net
    depends_on:
      neo4j:
        condition: service_healthy

  # ── Neo4j Graph Database ──────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: ai-noc-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - noc-net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  noc-net:
    driver: bridge
